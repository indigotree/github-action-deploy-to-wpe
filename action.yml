name: "Deploy WordPress projects to WP Engine"
branding:
  icon: "upload-cloud"
  color: "purple"
description: "Deploy WordPress to WP Engine via SSH Gateway. Requires DEPLOYS JSON array of rsync jobs."
inputs:
  WPE_SSHG_KEY_PRIVATE:
    description: "Base64-encoded private RSA key (single line). Encode with: base64 -w 0 < key (Linux) or base64 -i key (macOS)."
    required: true
  DEPLOYS:
    description: "JSON array of deploy jobs (src and flags required; optional name and dest). Inline in workflow YAML."
    required: true
  PHP_LINT:
    description: "optional php syntax check"
    required: false
    default: false
  CACHE_CLEAR:
    description: "When true, run WP-CLI page-cache and cdn-cache flush after all rsync jobs"
    required: false
    default: false
  PRD_BRANCH:
    description: "Source branch to deploy PRD_ENV"
    required: true
    default: "PROD_BRANCH_HERE"
  PRD_ENV:
    description: "Destination to deploy to WPE Prod"
    required: true
    default: "PROD_ENV_HERE"
  STG_BRANCH:
    description: "Source branch to deploy STG_ENV"
    required: false
    default: "STAGE_BRANCH_HERE"
  STG_ENV:
    description: "Destination to deploy to WPE Stage"
    required: false
    default: "STAGE_ENV_HERE"
  DEV_BRANCH:
    description: "Source branch to deploy DEV_ENV"
    required: false
    default: "DEV_BRANCH_HERE"
  DEV_ENV:
    description: "Destination to deploy to WPE Dev"
    required: false
    default: "DEV_ENV_HERE"

runs:
  using: "docker"
  image: "Dockerfile"
